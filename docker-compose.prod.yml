version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: croar-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vibin2003}
      POSTGRES_DB: ${DB_NAME:-HR}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: croar-redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    container_name: croar-mongodb
    restart: always
    # Cap the WiredTiger cache (small instance, ~2GB RAM) to avoid OOM.
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    volumes:
      - mongo_data:/data/db

  backend:
    image: appxcess/croar_server:${SERVER_VERSION:-latest}
    container_name: croar-backend
    restart: always
    depends_on:
      - db
      - redis
      - mongodb
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      # Add other environment variables as needed
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"

  worker:
    image: appxcess/croar_server:${SERVER_VERSION:-latest}
    container_name: croar-worker
    restart: always
    depends_on:
      - db
      - redis
      - mongodb
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./uploads:/app/uploads

  frontend:
    image: appxcess/croar_web:${WEB_VERSION:-latest}
    container_name: croar-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}

  nginx:
    image: nginx:alpine
    container_name: croar-nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    container_name: croar-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  certbot-etc:
  certbot-var:
  certbot-www:
