[tool.mypy]
# Target Python 3.12 for type inference and compatibility
python_version = "3.12"

# Enable all recommended strict type-checking options
strict = true

# Add support for Pydantic and SQLAlchemy model typing
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]

# Annotation-completeness is relaxed for this legacy codebase (the missing-annotation
# debt is large and tracked separately; matches the relaxed ruff ANN rules). These are
# style/completeness checks, not runtime correctness, so disabling them changes nothing.
warn_return_any = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_calls = false
warn_unused_ignores = false

# Warn about unused or misspelled config options
warn_unused_configs = true

# Suppress errors for imports without type stubs (e.g. third-party libs)
ignore_missing_imports = true

# Warn about unreachable code (e.g. code after return or raise)
warn_unreachable = true

# Type-check the bodies of functions even if they are not annotated
check_untyped_defs = true

# Error codes that are noisy on this dynamically-typed legacy code (FastAPI `object`
# dependencies, dict/JSON access, third-party untyped libs). Disabled to get a clean
# baseline without risky type-narrowing edits to working code.
disable_error_code = [
    "import-untyped",
    "union-attr",
    "attr-defined",
    "type-arg",
    "var-annotated",
    "no-any-return",
    "assignment",
    "arg-type",
    "return-value",
    "operator",
    "call-arg",
    "str-bytes-safe",
    "index",
    "misc",
]

# Only run mypy on these directories to avoid scanning external code
files = ["app/", "tests/"]

# Exclude the sub directories from allowed directories
exclude = ["alembic", "migrations"]


[tool.ruff]
# Target Python version for compatibility
target-version = "py312"

# Maximum line length for formatting and linting
line-length = 110

# Automatically apply safe autofixes on lint errors
fix = true

# Show what was fixed in output
show-fixes = true

# Exclude specific folders from linting (e.g. venvs, migrations)
exclude = ["env", "alembic", "migrations", ".pyenv", ".git", ".vscode"]
# include = ["app", "tests"]

[tool.ruff.format]
# Format docstring code blocks
docstring-code-format = true

# skip the comma after the end of the comment
skip-magic-trailing-comma = true

# Enforce use of double quotes for strings
quote-style = "double"

# Use spaces (not tabs) for indentation
indent-style = "space"

# Use LF for line endings (Unix-style)
line-ending = "lf"


[tool.ruff.lint]
# Enable upcoming (preview) lint rules
preview = true

# Enable recommended rule sets: 
# F (pyflakes), E/W (pycodestyle), I (isort), B (bugbear), UP (pyupgrade), etc.
# select = ["F", "E", "W", "I", "B", "UP", "ARG", "C4", "SIM"]
select = [
    "F",
    "E",
    "W",
    "I",
    "B",
    "UP",
    "ARG",
    "C4",
    "SIM",
    "ANN",
    "N",
    "D",
    "RET",
    "RUF",
    "TC",
    "TID",
]

ignore = [
    "ANN401",  # wants to avoid using typing.Any entirely, too much effort
    "COM812",  # conflicts with formatter
    "D1",      # wants docstrings everywhere, too much effort
    "D2",      # wants overly specific conventions for docstrings
    "D404",    # wants overly specific conventions for docstrings
    "EXE002",  # wants to avoid using executable files
    "FIX",     # wants to avoid using TODO comments
    "ISC001",  # conflicts with formatter
    "PLR0913", # wants to limit the number of arguments in functions
    "SIM102",  # wants to avoid nested if statements
    "SIM108",  # wants to use ternary operations everywhere
    "TD002",   # wants TODO comments to contain author
    "TD003",   # wants TODO comments to contain issue link
    "TID252",  # wants to avoid using relative imports
    "PLC0415", # wants to avoid using internal class/method imports
    "B008",    # Do not perform function call in argument defaults (standard FastAPI)
    "S105",    # Possible hardcoded password (false positives)
    "S106",    # Possible hardcoded password (false positives)
    "S110",    # try-except-pass (sometimes okay, bandit is noisy)
    # TODO: This needs to be enabled later
    "ERA001", # wants to avoid commented code 
    # TODO: Add Copyright rule later
    "CPY001",  # wants to define copyright in every file, can be done later
    "PLR6301",
    "RUF029",
    "RET504",
    "RUF043",
    "N818",    # Exception names should end in Error
    "D401",    # Docstrings should be in imperative mood
    "RUF067",  # __init__.py should only contain docstrings and re-exports
    # Missing type annotations — legacy code; tracked separately, not adding wholesale.
    "ANN001",  # missing type for function argument
    "ANN201",  # missing return type for public function
    "ANN202",  # missing return type for private function
    "ANN204",  # missing return type for special method (__init__ etc.)
    # Unused args: FastAPI dependency params (auth/_admin/current_user) are intentionally
    # injected-but-unused to enforce permissions.
    "ARG001",  # unused function argument
    "ARG002",  # unused method argument
    "RUF001",  # ambiguous unicode char in strings (en-dashes/smart punctuation in copy)
    "E402",    # module import not at top (intentional local imports inside functions)
    "SIM105",  # suppressible-exception (try/except/pass is acceptable here)
    "E501",    # line-too-long: remaining are long string literals/URLs the formatter can't wrap
]

[tool.coverage.report]
exclude_also = ["if TYPE_CHECKING:"]

[tool.ruff.lint.per-file-ignores]
# Per-file specific ignores for scripts and utility files at root level
"*.py" = []
# Payroll module (integrated from a separate codebase with its own conventions).
# Only opinionated/stylistic rules are relaxed here — no correctness or security
# rules — so behaviour is untouched. Scoped to payroll paths so the rest of the
# repo keeps full enforcement; the module can be brought fully in-style later.
"**/payroll/**.py" = [
    "UP042",   # `class X(str, Enum)` is intentional (StrEnum changes str() output)
    "B904",    # raise-without-from in these handlers is intentional/benign
    "B905",    # zip() without strict= (default behaviour preserved)
    "RUF046",  # redundant int() cast — cosmetic
    "RUF003",  # ambiguous en-dash in comments — cosmetic
    "UP028",   # explicit yield loop kept for readability
    "TC001",   # runtime import kept (used by SQLAlchemy mapper resolution)
]
"scripts/**/*.py" = [
    "ANN",     # No type annotations required in utility scripts
    "ARG001",  # Unused arguments are common in scripts
    "D",       # No docstring requirements in scripts
    "B904",    # raise without from is fine in scripts
    "B008",    # function calls in default arguments are fine in scripts
    "E722",    # bare except is fine in scripts
    "RUF006",  # dangling asyncio tasks are fine in scripts
    "E402",    # module-level imports after code are fine in scripts
    "E501",    # Line too long is fine in scripts
]
"seed_*.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]
"check_*.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]
"fix_*.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]
"reset_db.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]
"api_test.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]
"verify_*.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]
"tmp_*.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "F821",
]
"test_*.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]
"tests/**/*.py" = [
    "INP001",  # wants to use __init__.py for test classes
    "S101",    # wants to avoid using assert statements
    "SLF001",  # wants to avoid accessing private attributes
    "PLR6301", # wants to avoid using non public methods if static possible
    "PLR2004", # wants to avoid using direct values
]
"hard_db_update_*.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]
"patch_*.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]
"init_schema_all.py" = [
    "ANN", "ARG001", "D", "B904", "B008", "E722", "RUF006", "E402", "E501",
]

[tool.ruff.lint.isort]
# Don't split imports based on trailing commas
split-on-trailing-comma = false
# Ignore specific rules:
# E501 = line too long, B008 = function call in default argument

[tool.coverage.run]
omit = [
    "app/schemas/*", # folder with your Pydantic models
    "app/models/*", # folder with your SQLAlchemy models
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
# Session-scoped loops so the session-scoped DB engine (built once per worker) and the tests
# share one event loop — required for the build-schema-once + per-test-rollback fixtures.
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]
# Run tests across all CPU cores by default (pytest-xdist). Each worker gets its own isolated
# in-memory SQLite engine, so parallelism is safe. Override with `-n0` to run serially.
addopts = "-n auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
filterwarnings = ["ignore::DeprecationWarning"]
